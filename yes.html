<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>¡Feliz primer mes! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicon-sofia-diego.png">
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="hearts-bg" aria-hidden="true"></div>

    <main class="container yes-container">
        <h1 class="yes-title">¡Feliz primer mes, ratita! 🥰🎉</h1>

        <figure class="gif-container">
            <img id="cat-gif" class="ojitos-photo" src="assets/sofia-diego2.jpg" alt="Sofía y Diego">
            <!-- Original GIF for easy restore:
            <img id="cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
            -->
        </figure>

        <p class="yes-message">Mi lugar favorito siempre será contigo 💗</p>
    </main>

    <div class="walking-dog-track" aria-hidden="true">
        <div class="walking-dog" data-visual="walk">
            <img class="walking-dog-layer is-active" src="assets/walking-dachshund-top-animated.webp?v=3" alt="">
            <img class="walking-dog-layer" src="assets/walking-dachshund-top-animated.webp?v=3" alt="">
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" type="button" aria-label="Silenciar música" aria-pressed="true" title="Silenciar música">🔊</button>

    <script src="yes-script.js?v=9"></script>
</body>
</html>
