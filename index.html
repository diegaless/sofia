<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nuestro primer mes 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicon-sofia-diego.png">
    <link rel="stylesheet" href="style.css">
</head>
<body data-gif-set="gifs-imagegen-realista" data-gif-version="2">
    <div class="hearts-bg" aria-hidden="true"></div>

    <main class="container">
        <h1>¿Te quedas conmigo para todos los meses que vienen? 💗</h1>

        <figure class="gif-container">
            <img id="cat-gif" src="assets/gifs-imagegen-realista/stage-0-normal.gif?v=2" alt="Perro salchicha chocolate realista generado y animado">
        </figure>

        <div class="buttons">
            <button id="yes-btn" type="button">Sí</button>
            <button id="no-btn" type="button">No</button>
        </div>
        <div id="tease-toast" aria-live="polite"></div>
    </main>

    <audio id="bg-music" loop autoplay muted preload="auto">
        <source src="music/music-sofia.mp3?v=1" type="audio/mpeg">
    </audio>

    <button id="music-toggle" type="button" aria-label="Silenciar música" aria-pressed="true" title="Silenciar música">🔊</button>

    <script src="script.js?v=2"></script>
</body>
</html>
